<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1a26"/>
      <stop offset="100%" stop-color="#1a2d3f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c989"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b88a52"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="30" y="30" width="452" height="452" rx="80" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>
  <rect x="48" y="48" width="416" height="416" rx="68" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.35"/>
  <!-- Just "RF" — sized large to fill the tile so it reads at every size,
       even on home-screen badges where text-under-glyph subtitles are
       illegible. -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Playfair Display', serif" font-weight="900"
        font-size="320" fill="url(#gold)" letter-spacing="-16">RF</text>
</svg>
